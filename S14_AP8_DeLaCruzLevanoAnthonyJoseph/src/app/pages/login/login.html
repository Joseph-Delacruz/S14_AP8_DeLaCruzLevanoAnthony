<div class="login-container">

  <div class="login-box">

    <div class="patita">🐾</div>

    <h2>Patitas Felices</h2>

    <p>Centro de adopción y bienestar animal</p>

    <form (ngSubmit)="iniciarSesion()">

      <input
        type="email"
        [(ngModel)]="email"
        name="email"
        placeholder="Correo electrónico"
        required>

      <div class="password-box">

        <input
          [type]="verPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          name="password"
          placeholder="Contraseña"
          required>

        <span class="ojo" (click)="mostrarPassword()">
          {{ verPassword ? '🙈' : '👁️' }}
        </span>

      </div>

      <button type="submit">
        Iniciar Sesión
      </button>

    </form>

    <p class="error">{{ mensaje }}</p>

  </div>

</div>
